<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto-Tracker Pro | Monitor de Criptomonedas en Tiempo Real</title>
    <meta name="description" content="Sigue los precios de las criptomonedas en tiempo real con Crypto-Tracker Pro. Diseño Glassmorphism, modo oscuro y búsqueda rápida.">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
</head>
<body>
    <div class="app-background"></div>
    
    <header class="header">
        <div class="container header__content">
            <div class="header__logo">
                <span class="header__logo-icon">🚀</span>
                <h1 class="header__title">Crypto<span>Tracker</span></h1>
            </div>
            
            <div class="header__actions">
                <button id="theme-toggle" class="btn btn--icon" aria-label="Cambiar tema">
                    <svg id="theme-icon" class="icon" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Icon will be set dynamically by JS -->
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main container">
        <section class="search-section">
            <div class="search-bar">
                <svg class="search-bar__icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" class="search-bar__input" placeholder="Buscar criptomoneda (ej. Bitcoin, ETH...)" aria-label="Buscar criptomoneda">
            </div>
        </section>

        <section id="crypto-grid" class="crypto-grid">
            <!-- Loading Skeletons or Crypto Cards will be injected here -->
            <div class="loader">
                <div class="loader__spinner"></div>
                <p>Cargando datos del mercado...</p>
            </div>
        </section>
        
        <div id="error-message" class="error-msg hidden">
            <p>Ups! No pudimos obtener los datos. Por favor, reintenta más tarde.</p>
            <button id="retry-btn" class="btn btn--primary">Reintentar</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Crypto-Tracker Pro. Datos provistos por <a href="https://www.coingecko.com/" target="_blank" rel="noopener noreferrer">CoinGecko API</a>.</p>
        </div>
    </footer>

    <!-- Modular JS Scripts -->
    <script src="js/api.js" type="module"></script>
    <script src="js/dom.js" type="module"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
